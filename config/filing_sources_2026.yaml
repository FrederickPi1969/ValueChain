schema_version: 1
as_of_date: "2026-07-12"

download_policy:
  start_date: "2026-01-01"
  market_order:
    - US
    - major_non_us
    - remaining_markets
  canonical_source_required: true
  vendor_only_as_accelerator: true
  inventory_before_extraction: true

status_definitions:
  integrated_partial: "Production code exists in ValueChain, but completeness controls are missing."
  bundle_adapter_candidate: "Adapter exists only in the audited global-company-universe bundle."
  catalog_only: "Official route is known; no accepted machine acquisition contract exists in ValueChain."
  credential_required: "Official API exists and an operator-owned credential is required."
  license_required: "Complete automated acquisition requires a commercial or authority license."
  policy_blocked: "Public web access exists, but terms prohibit the planned automated database use."

sources:
  - source_id: sec_edgar
    rank: 0
    wave: us_2026
    jurisdictions: [US]
    authority: "U.S. Securities and Exchange Commission"
    official_url: "https://www.sec.gov/edgar/search/"
    machine_url: "https://data.sec.gov/"
    access_mode: public_api_and_archive
    credentials: []
    repo_status: integrated_partial
    canonical: true
    capabilities: [issuer_universe, filing_discovery, historical_index, document_inventory, document_download, structured_facts]
    missing:
      - "Full submissions-history pagination beyond filings.recent."
      - "Daily and quarterly index reconciliation as a completeness denominator."
      - "Complete-submission .txt and all-attachment inventory/download modes."
      - "Amendment-aware form normalization and all-form inventory."
      - "Async downloader with retry, atomic partial files, resume, and persistent job state."

