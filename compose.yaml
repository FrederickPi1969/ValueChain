services:
  postgres:
    image: postgres:16
    container_name: valuechain-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: valuechain
      POSTGRES_USER: valuechain
      POSTGRES_PASSWORD: ${VALUECHAIN_POSTGRES_PASSWORD:-valuechain_dev}
    ports:
      - "${VALUECHAIN_POSTGRES_BIND:-127.0.0.1}:${VALUECHAIN_POSTGRES_PORT:-5433}:5432"
    volumes:
      - ${VALUECHAIN_POSTGRES_DATA_DIR:-valuechain_pgdata}:/var/lib/postgresql/data
      - ./db/schema.sql:/docker-entrypoint-initdb.d/001_schema.sql:ro
      - ./db/acquisition_schema.sql:/docker-entrypoint-initdb.d/002_acquisition_schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U valuechain -d valuechain"]
      interval: 5s
      timeout: 5s
      retries: 12

  adminer:
    image: adminer:4
    container_name: valuechain-adminer
    restart: unless-stopped
    ports:
      - "${VALUECHAIN_ADMINER_BIND:-127.0.0.1}:${VALUECHAIN_ADMINER_PORT:-8081}:8080"
    depends_on:
      postgres:
        condition: service_healthy

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: valuechain-api
    restart: unless-stopped
    environment:
      VALUECHAIN_DATABASE_URL: postgresql://valuechain:${VALUECHAIN_POSTGRES_PASSWORD:-valuechain_dev}@postgres:5432/valuechain
      VALUECHAIN_API_HOST: 0.0.0.0
      VALUECHAIN_API_PORT: 8000
      VALUECHAIN_ACQUISITION_FILE_ROOTS: /mnt/hdd8tb/filings,/mnt/hdd8tb/valuechain
      VALUECHAIN_FILE_API_TOKEN: ${VALUECHAIN_FILE_API_TOKEN:-}
    ports:
      - "${VALUECHAIN_API_BIND:-127.0.0.1}:${VALUECHAIN_API_PORT:-8000}:8000"
    volumes:
      - ${VALUECHAIN_FILE_HOST_SEC_ROOT:-./data/raw/sec_edgar}:/mnt/hdd8tb/filings/sec_edgar:ro
      - ${VALUECHAIN_FILE_HOST_VALUECHAIN_ROOT:-./data}:/mnt/hdd8tb/valuechain:ro
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  valuechain_pgdata:
