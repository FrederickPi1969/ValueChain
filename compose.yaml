services:
  postgres:
    image: postgres:16
    container_name: valuechain-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: valuechain
      POSTGRES_USER: valuechain
      POSTGRES_PASSWORD: valuechain_dev
    ports:
      - "5433:5432"
    volumes:
      - valuechain_pgdata:/var/lib/postgresql/data
      - ./db/schema.sql:/docker-entrypoint-initdb.d/001_schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U valuechain -d valuechain"]
      interval: 5s
      timeout: 5s
      retries: 12

  adminer:
    image: adminer:4
    container_name: valuechain-adminer
    restart: unless-stopped
    ports:
      - "8081:8080"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  valuechain_pgdata:
