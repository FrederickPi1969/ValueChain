- source_id: fca_firds_priority
  name: FCA FIRDS priority-market equity reference files
  jurisdictions:
  - GB
  - DE
  - FR
  - IT
  - ES
  - NL
  macro_regions:
  - Europe
  adapter: gcu_priority_markets.adapters.firds:FcaFirdsAdapter
  access_mode: public_bulk
  official_url: https://www.fca.org.uk/markets/transaction-reporting/financial-instruments-reference-data-system-firds
  api_base_url: https://api.data.fca.org.uk/
  capabilities:
  - entity_universe
  - historical_index
  - event_monitoring
  - reconciliation
  historical_scope: Full, delta and cancellation instrument-reference files filtered by equity CFI and target MIC.
  status: implemented_contract_tested_deployment_smoke_required
  notes: Provides source-local listing denominator, not canonical issuer legal names. Use issuer LEI for resolution.
  rate_limit_requests_per_second: 0.5
- source_id: fca_official_list
  name: FCA Official List export and listings reference
  jurisdictions:
  - GB
  macro_regions:
  - Europe
  adapter: gcu_priority_markets.adapters.official_export:OfficialExportAdapter
  access_mode: official_web
  official_url: https://data.fca.org.uk/
  capabilities:
  - entity_universe
  - historical_index
  - event_monitoring
  - reconciliation
  historical_scope: FCA Official List search/export used to reconcile LSE and FIRDS equity denominators.
  status: implemented_import_and_snapshot_monitor
  notes: Official List includes debt and non-equity securities; apply the contract filters before treating rows as company-equity
    listings.
  rate_limit_requests_per_second: 0.25
- source_id: lse_issuer_list
