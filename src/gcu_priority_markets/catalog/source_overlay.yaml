sources:
- source_id: cninfo
  name: CNINFO Mainland China statutory disclosure platform
  jurisdictions:
  - CN
  macro_regions:
  - Asia
  adapter: gcu_priority_markets.adapters.cninfo:CninfoAdapter
  access_mode: semi_public_web_endpoint
  official_url: https://www.cninfo.com.cn/
  api_base_url: https://www.cninfo.com.cn/new/
  capabilities:
  - entity_universe
  - filing_discovery
  - document_inventory
  - document_download
  - event_monitoring
  historical_scope: Combined SSE/SZSE/BSE issuer-orgId map plus paginated statutory announcement search.
  status: implemented_contract_tested_deployment_smoke_required
  notes: Uses public endpoints consumed by the official site. One combined issuer map is split by market; apply conservative
    polling and preserve raw responses.
  rate_limit_requests_per_second: 0.5
